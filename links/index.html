  <script>(function() {
    const LOCAL_JS_PATH = "/abcjs-basic-min.js"; 

    function startRender() {
        const blocks = document.querySelectorAll('code.language-abc');
        
        blocks.forEach((el) => {
            const pre = el.parentElement;
            // 如果已经渲染过（有了容器），就不再重复
            if (!pre || pre.classList.contains('abc-hidden')) return;

            const container = document.createElement('div');
            container.style.background = "#fff";
            container.style.padding = "20px";
            container.style.margin = "10px 0";
            container.style.borderRadius = "8px";
            
            pre.parentNode.insertBefore(container, pre);
            pre.classList.add('abc-hidden');

            // 直接调用渲染
            ABCJS.renderAbc(container, el.textContent.trim(), { 
                responsive: 'resize'
            });
        });
    }

    // 核心：先加载 JS，在 onload 事件里才允许执行渲染逻辑
    if (!window.ABCJS) {
        const script = document.createElement('script');
        script.src = LOCAL_JS_PATH;
        script.onload = () => {
            console.log("✅ ABCJS 已就绪，开始渲染...");
            startRender();
            
            // 之后才开启监听，防止在库加载完之前乱跑
            const observer = new MutationObserver(startRender);
            observer.observe(document.body, { childList: true, subtree: true });
        };
        document.head.appendChild(script);
    } else {
        startRender();
    }
})();</script>
